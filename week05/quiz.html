<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Form</title>
    <link rel="stylesheet" href="Styles/quiz.css">
</head>
<body>
    <main class="box">   
        <h1>✅Basic HTML and CSS Quiz</h1>
        <form class="box">
         <div class="quiz-item">
            <div class="quiz-item box">
            <label> for="q1">1. What does the acronymn CSS stand for?</label>
                <input type="text" id="q1" name="q1">
                </div>
            </div>
            <div class="quiz-item box">
            <label for="q2">2. How are id and class attributes selected in CSS?</label>
            <input type="text" id="q2" name="q2">
            <button type="submit">Submit</button></div>
            <div class="quiz-item box">
            <label for="q3">3. Which of the following is a valid CSS comment?</label>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One ---</option>
                <option value="a">A. &lt;!-- This is a comment--&gt;</option>
                <option value="b">B. /* This is a comment */</option>
                <option value="c">C. // This is a comment</option>
            </select>
            </div>
            <div class="quiz-item box">
            <label for="q4">4. What is the correct way to include a CSS file in an HTML document?</label>
            <code>margin: 10px 5px 15px;</code>
            <input type="number" id="q4" name="q4">
       </div>
       <button type="submit">Submit Quiz for Grading</button>
        
        </form>       
    </main>
</body>
</html>
