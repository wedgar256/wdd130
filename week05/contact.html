<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rafting Logo" class="logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFO -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-grid">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Jinja+Uganda&output=embed" width="100%" height="300">
                </iframe>
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <label>Name</label>
                <input type="text" placeholder="Your Name">

                <label>Email</label>
                <input type="email" placeholder="Your Email">

                <p>Message Purpose</p>
                <label><input type="radio" name="purpose"> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>

                <label>Message</label>
                <textarea placeholder="Type here"></textarea>

                <label>
                    <input type="checkbox"> Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>
        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-cards">
                <figure>
                    <img src="images/employee1.jpg" alt="">
                    <figcaption>John – Lead Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="">
                    <figcaption>Sarah – Safety Officer</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="">
                    <figcaption>Mike – Trip Coordinator</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>Footer Content including Social Media Icons/Links</p>
    </footer>

</body>

</html>
