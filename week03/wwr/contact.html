<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting Company for thrilling adventures">
    <meta name="author" content="Wanyama Edgar">
    <title>White Water Rafting | Contact Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <a id="logo_link" href="index.html">
            <img class="logo" src="images/logo.png" alt="White Water Rafting Company Logo">
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contact-grid">
            <section class="contact-info">
                <h2>Contact Information</h2>
                <p>123 Rafting Way<br>Rivertown, CA 90000</p>
                <p>Phone: 1-800-555-RAFT</p>
                <p>Email: info@whitewaterrafting.com</p>
            </section>
            
            <section class="contact-form-section">
                <h2>Send Us a Message</h2>
                <form action="#" method="get" class="contact-form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    
                    <div>
                        <input type="radio" id="newsletter" name="subscribe" value="yes">
                        <label for="newsletter">Subscribe to newsletter</label>
                    </div>
                    
                    <button type="submit">Send Message</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting Company - Wanyama Edgar</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/pinterest.png.svg" alt="Pinterest"></a>
            <a href="#"><img src="images/twitter.svg" alt="X"></a>
            <a href="#"><img src="images/youtube.svg" alt="YouTube"></a>
        </nav>
    </footer>
</body>
</html>
